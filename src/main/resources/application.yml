server:
  port: 8080

spring:
  application:
    name: smartkb

  data:
    mongodb:
      uri: mongodb://localhost:27017/smartkb
      auto-index-creation: true

    redis:
      host: localhost
      port: 6379

    elasticsearch:
      repositories:
        enabled: true

  elasticsearch:
    uris: http://localhost:9200
    username:
    password:

logging:
  level:
    com.smartkb: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.data.elasticsearch: DEBUG
